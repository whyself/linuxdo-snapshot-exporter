<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snapshot Exporter</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="wrap">
      <h1>Linux.do 快照导出</h1>

      <label for="scope">导出范围</label>
      <select id="scope">
        <option value="op_only">仅主楼（默认）</option>
        <option value="op_plus_replies">主楼 + 楼主回帖</option>
        <option value="all_posts">全部楼层</option>
      </select>

      <div class="actions">
        <button id="exportBtn" type="button">导出 Markdown</button>
        <button id="exportImageBtn" type="button" class="secondary">导出长图</button>
      </div>

      <p class="hint">Markdown 和长图都基于当前页面抓取，建议先滚动加载到你需要的内容。</p>
      <p id="status" class="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
